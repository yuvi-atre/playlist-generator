<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playlist Generator — vibe-curated from your liked songs</title>
    <meta
      name="description"
      content="Describe a vibe and get a curated Spotify playlist pulled straight from your liked songs."
    />
    <link rel="canonical" href="https://playlist-generator-theta-one.vercel.app/" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Warm up connections to every external origin the app talks to:
         auth handshake, library fetch, album art, and Last.fm genre tags.
         Saves a DNS+TLS round trip each on first use. -->
    <link rel="preconnect" href="https://accounts.spotify.com" />
    <link rel="preconnect" href="https://api.spotify.com" />
    <link rel="preconnect" href="https://i.scdn.co" crossorigin />
    <link rel="preconnect" href="https://ws.audioscrobbler.com" />

    <!-- Open Graph / social share -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Playlist Generator — vibe-curated from your liked songs" />
    <meta
      property="og:description"
      content="Describe a vibe and get a curated Spotify playlist pulled straight from your liked songs."
    />
    <meta property="og:url" content="https://playlist-generator-theta-one.vercel.app/" />
    <meta
      property="og:image"
      content="https://playlist-generator-theta-one.vercel.app/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Playlist Generator — vibe-curated from your liked songs" />
    <meta
      name="twitter:description"
      content="Describe a vibe and get a curated Spotify playlist pulled straight from your liked songs."
    />
    <meta
      name="twitter:image"
      content="https://playlist-generator-theta-one.vercel.app/og-image.png"
    />

    <!-- Structured data for search engines -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Playlist Generator",
        "url": "https://playlist-generator-theta-one.vercel.app/",
        "description": "Describe a vibe and get a curated Spotify playlist pulled straight from your liked songs.",
        "applicationCategory": "MusicApplication",
        "operatingSystem": "Web",
        "image": "https://playlist-generator-theta-one.vercel.app/og-image.png"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
